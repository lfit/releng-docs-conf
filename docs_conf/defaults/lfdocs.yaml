---
project: lf-releng-docs
release: master
version: master
author: Linux Foundation Releng
copyright: "2017-{}, The Linux Foundation"

needs_sphinx: "7.0"
extensions:
  - sphinx.ext.autodoc
  - sphinx.ext.doctest
  - sphinx.ext.intersphinx
  - sphinx.ext.todo
  - sphinx.ext.coverage
  - sphinx.ext.viewcode
  - sphinx_tabs.tabs
exclude_patterns:
  - .DS_Store
  - _build
  - Thumbs.db
  - .tox
todo_include_todos: false

html_favicon: favicon.ico
html_logo: _static/logo.png
html_static_path:
  - _static
html_theme: sphinx_rtd_theme
html_theme_options:
  style_nav_header_background: "white"
  sticky_navigation: "False"
