---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Gerrit-integrated Python Build/Test workflow with manual dispatch bypass.
#
# When dispatched by gerrit_to_platform (default):
#   - Clears previous Gerrit Verified vote
#   - Checks out the unmerged Gerrit change via refspec
#   - Runs lint, build, test, audit, and SBOM jobs
#   - Votes the workflow conclusion back to Gerrit
#
# When dispatched manually from the GitHub Actions UI:
#   - Set MANUAL_DISPATCH to true
#   - Gerrit voting jobs are skipped
#   - Standard actions/checkout is used against the selected branch
#   - Lint, build, test, audit, and SBOM jobs run normally
name: 'Gerrit Verify'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      MANUAL_DISPATCH:
        description: "Run without Gerrit voting jobs"
        required: false
        type: boolean
        default: false
      clear_cache:
        description: 'Clear all Python dependency caches'
        type: boolean
        default: false
        required: false
      GERRIT_BRANCH:
        description: "Branch that change is against"
        required: false
        type: string
        default: ""
      GERRIT_CHANGE_ID:
        description: "The ID for the change"
        required: false
        type: string
        default: ""
      GERRIT_CHANGE_NUMBER:
        description: "The Gerrit number"
        required: false
        type: string
        default: ""
      GERRIT_CHANGE_URL:
        description: "URL to the change"
        required: false
        type: string
        default: ""
      GERRIT_EVENT_TYPE:
        description: "Gerrit event type"
        required: false
        type: string
        default: ""
      GERRIT_PATCHSET_NUMBER:
        description: "The patch number for the change"
        required: false
        type: string
        default: ""
      GERRIT_PATCHSET_REVISION:
        description: "The revision sha"
        required: false
        type: string
        default: ""
      GERRIT_PROJECT:
        description: "Project in Gerrit"
        required: false
        type: string
        default: ""
      GERRIT_REFSPEC:
        description: "Gerrit refspec of change"
        required: false
        type: string
        default: ""

concurrency:
  # yamllint disable-line rule:line-length
  group: "${{ github.event.inputs.GERRIT_CHANGE_ID || github.run_id }}"
  cancel-in-progress: true

permissions: {}

jobs:

  # ===================================================================
  # Gerrit: Clear previous Verified vote (skipped for manual dispatch)
  # ===================================================================
  clear-vote:
    if: >-
      inputs.MANUAL_DISPATCH == false
      && inputs.GERRIT_CHANGE_NUMBER != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Clear votes
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/gerrit-review-action@a5de1d5bf17c2603ae81544dc2a455017b454ec8  # v1.1.1
        with:
          host: ${{ vars.LFIT_GERRIT_SERVER }}
          username: ${{ vars.LFIT_GERRIT_SSH_USER }}
          key: ${{ secrets.LFIT_GERRIT_SSH_PRIVKEY_NP }}
          known_hosts: ${{ vars.LFIT_GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          vote-type: clear
      - name: Allow replication
        run: sleep 10s

  # ===================================================================
  # Lint: actionlint + prek (parallel with build pipeline)
  # ===================================================================
  actionlint:
    name: 'Actionlint'
    if: >-
      !cancelled()
      && (needs.clear-vote.result == 'success'
          || needs.clear-vote.result == 'skipped')
    needs: clear-vote
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      # --- Gerrit Checkout ---
      - name: Checkout Gerrit change
        if: inputs.GERRIT_REFSPEC != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-url: ${{ vars.GERRIT_URL }}
          delay: "0s"
          ref: refs/heads/${{ inputs.GERRIT_BRANCH }}

      # --- Standard Checkout ---
      - name: Checkout repository (manual)
        if: inputs.GERRIT_REFSPEC == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Download actionlint
        id: get_actionlint
        # yamllint disable-line rule:line-length
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash
      - name: Check workflow files
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash

  pre-commit:
    name: 'Pre-commit'
    # Skip on manual workflow_dispatch: the 'no-commit-to-branch' hook
    # always fails on the default branch checked out for manual runs.
    # Only run when invoked from Gerrit (refspec is set).
    if: >-
      !cancelled()
      && inputs.GERRIT_REFSPEC != ''
      && (needs.clear-vote.result == 'success'
          || needs.clear-vote.result == 'skipped')
    needs: clear-vote
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # --- Gerrit Checkout ---
      - name: Checkout Gerrit change
        if: inputs.GERRIT_REFSPEC != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-url: ${{ vars.GERRIT_URL }}
          delay: "0s"
          ref: refs/heads/${{ inputs.GERRIT_BRANCH }}

      # --- Standard Checkout ---
      - name: Checkout repository (manual)
        if: inputs.GERRIT_REFSPEC == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Configure Python
        # yamllint disable-line rule:line-length
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - name: Run static analysis and format checkers
        # yamllint disable-line rule:line-length
        run: SKIP=actionlint pipx run prek run --all-files --show-diff-on-failure

  # ===================================================================
  # Repository Metadata
  # ===================================================================
  repository-metadata:
    name: "Repository Metadata"
    if: >-
      !cancelled()
      && (needs.clear-vote.result == 'success'
          || needs.clear-vote.result == 'skipped')
    needs: clear-vote
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 5
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      # --- Gerrit Checkout (when dispatched by gerrit_to_platform) ---
      - name: Checkout Gerrit change
        if: inputs.GERRIT_REFSPEC != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-url: ${{ vars.GERRIT_URL }}
          delay: "0s"
          fetch-depth: 0
          ref: refs/heads/${{ inputs.GERRIT_BRANCH }}

      # --- Standard Checkout (for manual dispatch) ---
      - name: Checkout repository (manual)
        if: inputs.GERRIT_REFSPEC == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: "Gather repository metadata"
        id: repo-metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/repository-metadata-action@ceabcd987d13d7bfefd2372e01eebb0ddac45956  # v0.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_summary: 'true'
          gerrit_summary: 'false'
          artifact_upload: 'true'
          artifact_formats: 'json'

  # ===================================================================
  # Python Build
  # ===================================================================
  python-build:
    name: 'Python Build'
    if: >-
      !cancelled()
      && (needs.clear-vote.result == 'success'
          || needs.clear-vote.result == 'skipped')
    needs: clear-vote
    runs-on: 'ubuntu-latest'
    outputs:
      matrix_json: "${{ steps.python-build.outputs.matrix_json }}"
      artefact_name: "${{ steps.python-build.outputs.artefact_name }}"
      artefact_path: "${{ steps.python-build.outputs.artefact_path }}"
    permissions:
      contents: read
      actions: write  # Required for cache deletion when clear_cache is true
    timeout-minutes: 12
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      # --- Gerrit Checkout ---
      - name: Checkout Gerrit change
        if: inputs.GERRIT_REFSPEC != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-url: ${{ vars.GERRIT_URL }}
          delay: "0s"
          fetch-depth: 0
          ref: refs/heads/${{ inputs.GERRIT_BRANCH }}

      # --- Standard Checkout ---
      - name: Checkout repository (manual)
        if: inputs.GERRIT_REFSPEC == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: 'Build Python project'
        id: python-build
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-build-action@5f570d5d17a7315074a824a91c6a705b6fc5c7dd  # v1.1.2
        with:
          clear_cache: ${{ github.event.inputs.clear_cache || 'false' }}

  # ===================================================================
  # Python Tests (matrix)
  # ===================================================================
  python-tests:
    name: 'Python Tests'
    # The !cancelled() guard prevents GitHub's auto-skip propagation
    # from skipping this job when clear-vote (transitive dependency via
    # python-build) was skipped on manual dispatch. Without this, the
    # implicit `if: success()` evaluates against the whole needs graph
    # and silently auto-skips the matrix.
    if: >-
      !cancelled()
      && needs.python-build.result == 'success'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-build.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 12
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      # --- Gerrit Checkout ---
      - name: Checkout Gerrit change
        if: inputs.GERRIT_REFSPEC != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-url: ${{ vars.GERRIT_URL }}
          delay: "0s"
          ref: refs/heads/${{ inputs.GERRIT_BRANCH }}

      # --- Standard Checkout ---
      - name: Checkout repository (manual)
        if: inputs.GERRIT_REFSPEC == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: "Python tests [pytest] ${{ matrix.python-version }}"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-test-action@aa753462f090101dcb0c4708e9499f55e276e373  # v1.1.2
        with:
          python_version: ${{ matrix.python-version }}

  # ===================================================================
  # Python Audit (matrix)
  # ===================================================================
  python-audit:
    name: 'Python Audit'
    if: >-
      !cancelled()
      && needs.python-build.result == 'success'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-build.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      # --- Gerrit Checkout ---
      - name: Checkout Gerrit change
        if: inputs.GERRIT_REFSPEC != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-url: ${{ vars.GERRIT_URL }}
          delay: "0s"
          ref: refs/heads/${{ inputs.GERRIT_BRANCH }}

      # --- Standard Checkout ---
      - name: Checkout repository (manual)
        if: inputs.GERRIT_REFSPEC == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: "Audit dependencies ${{ matrix.python-version }}"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-audit-action@fcb1b2e0cdbe19edf11057e598138f3d57f2b249  # v0.3.1
        with:
          python_version: "${{ matrix.python-version }}"
          # Honour the same NO_BLOCK_AUDIT_FAIL override as the Grype
          # gate so the dependency audit does not block the change on
          # newly discovered CVEs when the variable is set.
          permit_fail: "${{ vars.NO_BLOCK_AUDIT_FAIL == 'true' }}"

  # ===================================================================
  # SBOM Generation
  # ===================================================================
  sbom:
    name: 'Generate SBOM'
    if: >-
      !cancelled()
      && needs.python-build.result == 'success'
    runs-on: ubuntu-latest
    needs: 'python-build'
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # --- Gerrit Checkout ---
      - name: Checkout Gerrit change
        if: inputs.GERRIT_REFSPEC != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}
          gerrit-url: ${{ vars.GERRIT_URL }}
          delay: "0s"
          ref: refs/heads/${{ inputs.GERRIT_BRANCH }}

      # --- Standard Checkout ---
      - name: Checkout repository (manual)
        if: inputs.GERRIT_REFSPEC == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: "Generate SBOM"
        id: sbom
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-sbom-action@ae4aca2ef28d7da4ec95049cc78be43e632d322a  # v0.1.0
        with:
          include_dev: "false"
          sbom_format: "both"

      - name: "Upload SBOM artifacts"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-files
          path: |
            sbom-cyclonedx.json
            sbom-cyclonedx.xml
          retention-days: 45

      - name: "SBOM summary"
        run: |
            # SBOM summary
            {
              echo "## SBOM Summary"
              echo "SBOM count: ${{ steps.sbom.outputs.component_count }}"
              echo "Tool used: ${{ steps.sbom.outputs.dependency_manager }}"
            } >> "$GITHUB_STEP_SUMMARY"

  # ===================================================================
  # Grype Vulnerability Scan (audits the SBOM produced above)
  # ===================================================================
  grype:
    name: 'Grype Audit SBOM'
    if: >-
      !cancelled()
      && needs.sbom.result == 'success'
    runs-on: ubuntu-latest
    needs: 'sbom'
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: "Download SBOM artefact"
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom-files

      - name: "Install Grype"
        id: grype
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          cache-db: "true"

      # The NO_BLOCK_AUDIT_FAIL repository variable (when set to
      # 'true') disables failure propagation so the gate does not block
      # the change when blocked by newly discovered CVEs in transitive
      # dependencies. Without the override, this step turns red in the
      # workflow run's Actions/Checks UI and is the sole source of the
      # job's failure annotation; the CVE table is printed directly
      # into the step log by echoing grype-results.txt.
      - name: "Grype audit SBOM"
        id: grype-audit
        env:
          GRYPE_CMD: "${{ steps.grype.outputs.cmd }}"
          NO_BLOCK_AUDIT_FAIL: >-
            ${{ vars.NO_BLOCK_AUDIT_FAIL == 'true' }}
        run: |
            # Run grype once, emitting all three output formats
            # Render the human-readable table in this step's log
            set +e
            "${GRYPE_CMD}" \
              -o "sarif=grype-results.sarif" \
              -o "json=grype-results.json" \
              -o "table=grype-results.txt" \
              --fail-on medium \
              "sbom:sbom-cyclonedx.json"
            grype_exit=$?
            set -e

            echo "--- Grype scan results ---"
            if [ -f grype-results.txt ]; then
              cat grype-results.txt
            else
              echo "No table output produced"
            fi

            # grype returns 2 when it finds vulnerabilities at or
            # above the configured --fail-on threshold; any other
            # non-zero exit is treated as a grype failure.
            if [ "${grype_exit}" = "0" ]; then
              echo "No vulnerabilities at or above 'medium'"
              exit 0
            fi
            if [ "${grype_exit}" != "2" ]; then
              echo "::error::Grype exited with code ${grype_exit}"
              exit "${grype_exit}"
            fi

            if [ "${NO_BLOCK_AUDIT_FAIL}" = "true" ]; then
              echo "::warning::Grype found vulnerabilities at or" \
                "above the 'medium' threshold, but" \
                "NO_BLOCK_AUDIT_FAIL is set so the job will not" \
                "fail."
              exit 0
            fi
            echo "::error::Grype found vulnerabilities at or above" \
              "the 'medium' severity threshold. See the table" \
              "above for the offending packages and CVEs."
            exit 1

      - name: "Upload Grype scan results"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: grype-scan-results
          path: |
            grype-results.sarif
            grype-results.json
            grype-results.txt
          retention-days: 90
          if-no-files-found: warn

      - name: "Grype summary"
        if: always()
        run: |
            # Render a Markdown table of Grype matches in the job
            # step summary. The CVE data is sourced from the JSON
            # scan output (grype-results.json) and processed with
            # jq so that multi-word cells cannot accidentally break
            # the Markdown table column layout. Any literal pipe
            # characters present in cell content are escaped.
            {
              echo "## Grype Vulnerability Scan"
              echo ""
              if [ ! -f grype-results.json ]; then
                echo "No scan results available"
                exit 0
              fi
              match_count=$(jq '.matches | length' grype-results.json)
              if [ "${match_count}" = "0" ]; then
                echo "No vulnerabilities found at or above the" \
                  "configured severity threshold."
                exit 0
              fi
              echo "Found ${match_count} matching Grype record(s)."
              echo ""
              echo "| Package | Installed | Fixed In | Type |" \
                "Vulnerability | Severity | EPSS | Risk |"
              echo "| --- | --- | --- | --- | --- | --- | --- | --- |"
              jq -r '
                def esc: tostring | gsub("\\|"; "\\|");
                # Round a numeric value to two decimal places
                # using half-up rounding via jq built-in `round`.
                def round2: (. * 100 | round) / 100;
                def epss_pct:
                  ( .vulnerability.epss // [] ) as $e
                  | if ($e | length) == 0 then "-"
                    else ( $e[0].epss // 0 ) as $p
                      | if $p == 0 then "0%"
                        elif ($p * 100) < 0.01 then "<0.01%"
                        else ( ($p * 100) | round2 | tostring
                               + "%" ) end
                    end;
                def risk_fmt:
                  .vulnerability.risk
                  | if . == null then "-"
                    elif type == "number" then
                      (round2 | tostring)
                    else (. | tostring) end;
                .matches[] |
                [ (.artifact.name // "-" | esc),
                  (.artifact.version // "-" | esc),
                  ( ( .vulnerability.fix.versions // [] )
                    | if length == 0 then "-"
                      else join(", ") end | esc ),
                  (.artifact.type // "-" | esc),
                  (.vulnerability.id // "-" | esc),
                  (.vulnerability.severity // "-" | esc),
                  epss_pct,
                  risk_fmt
                ] | "| " + join(" | ") + " |"
              ' grype-results.json
            } >> "$GITHUB_STEP_SUMMARY"

  # ===================================================================
  # Gerrit: Vote result (skipped for manual dispatch)
  # ===================================================================
  vote:
    if: >-
      always()
      && inputs.MANUAL_DISPATCH == false
      && inputs.GERRIT_CHANGE_NUMBER != ''
    needs:
      - clear-vote
      - actionlint
      - pre-commit
      - repository-metadata
      - python-build
      - python-tests
      - python-audit
      - sbom
      - grype
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Get workflow conclusion
        # yamllint disable-line rule:line-length
        uses: im-open/workflow-conclusion@7b146947e59eaf7fc3328822357861ab1758c088  # v2.2.5
      - name: Set vote
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/gerrit-review-action@a5de1d5bf17c2603ae81544dc2a455017b454ec8  # v1.1.1
        with:
          host: ${{ vars.LFIT_GERRIT_SERVER }}
          username: ${{ vars.LFIT_GERRIT_SSH_USER }}
          key: ${{ secrets.LFIT_GERRIT_SSH_PRIVKEY_NP }}
          known_hosts: ${{ vars.LFIT_GERRIT_KNOWN_HOSTS }}
